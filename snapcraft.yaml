name: wattwise
base: core22
version: '1.0.0'
summary: WattWise: Premium Linux CPU Optimizer
description: |
  A high-performance Linux power management suite built on auto-cpufreq.
  Engineered with Rust and Tauri for maximum efficiency and a premium GUI.

grade: stable
confinement: strict

parts:
  auto-cpufreq:
    plugin: nil
    source: .
    build-snaps:
      - rustup
      - node/18/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - libsoup-3.0-dev
      - pkg-config
    override-build: |
      npm install
      npm run tauri build -- --bundles appimage
      cp target/release/zenith-energy $SNAPCRAFT_PART_INSTALL/bin/

apps:
  zenith-energy:
    command: bin/zenith-energy
    plugs:
      - cpu-control
      - system-observe
      - hardware-observe
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - unity7
  daemon:
    command: bin/wattwise --daemon
    daemon: simple
    plugs:
      - cpu-control
      - system-observe
