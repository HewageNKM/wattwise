name: auto-cpufreq-rust
base: core22
version: '1.0.0'
summary: High-performance Linux CPU optimizer
description: |
  A complete overhaul of auto-cpufreq in Rust and Tauri.
  Provides macOS-level power management with a premium GUI.

grade: stable
confinement: strict

parts:
  auto-cpufreq:
    plugin: nil
    source: .
    build-snaps:
      - rustup
      - node/18/stable
    build-packages:
      - libwebkit2gtk-4.1-dev
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - libsoup-3.0-dev
      - pkg-config
    override-build: |
      npm install
      npm run tauri build -- --bundles appimage
      cp target/release/auto-cpufreq-rust $SNAPCRAFT_PART_INSTALL/bin/

apps:
  auto-cpufreq-rust:
    command: bin/auto-cpufreq-rust
    plugs:
      - cpu-control
      - system-observe
      - hardware-observe
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - unity7
  daemon:
    command: bin/auto-cpufreq-rust --daemon
    daemon: simple
    plugs:
      - cpu-control
      - system-observe
